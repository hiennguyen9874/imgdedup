# CẤU HÌNH MẪU CHO IMGDEDUP
# Chạy chỉ bằng file này:
#   uv run python main.py --config config.yolo-dedup.yaml
#
# Thứ tự ưu tiên: mặc định của chương trình < CLI < file config.
# Nghĩa là giá trị trong file này LUÔN ghi đè giá trị truyền trên CLI.
# Ví dụ `batch_size: 64` bên dưới sẽ thắng cả khi CLI có `--batch-size 128`.
# Tên option trong YAML dùng snake_case: `--cross-folder-only` -> `cross_folder_only`.
# Đường dẫn tương đối được tính từ thư mục hiện tại nơi chạy lệnh.
# Xóa hoặc thêm dấu # trước một dòng để dùng giá trị mặc định của chương trình.

# -----------------------------------------------------------------------------
# YOLO-DEDUP: thay phần cấu hình đang hoạt động phía trên bằng mẫu sau.
# Dataset phải có data.yaml và các manifest train.txt, test.txt; val.txt là tùy chọn.
# Lệnh luôn export dataset mới; không hỗ trợ inplace hoặc hard_delete.

command: yolo-dedup
dataset: /home/jovyan/workspace/evnhcmc-workspace/data/workspace/datasets/annotated/EVNNhom2-Annotated-New
output: /home/jovyan/workspace/evnhcmc-workspace/data/workspace/datasets/annotated/EVNNhom2-Annotated-New-Deduped
copy_mode: copy              # copy | hardlink | symlink
force: false
split_priority: test,val,train # Split giữ lại từ cao đến thấp.

# --- Nhận diện trùng (giống workflow dedup) ---
# Phải thỏa cosine_review <= cosine_verify <= cosine_auto.
cosine_auto: 0.97
cosine_verify: 0.90
cosine_review: 0.85
phash_auto_distance: 4
phash_verify_distance: 8
k: 50

# --- Model và tài nguyên ---
model: facebook/dinov3-vitb16-pretrain-lvd1689m
batch_size: 128
metadata_workers: 4
loader_workers: 0
gpus: null
gpu_memory_fraction: 0.9
save_faiss_index: false

# --- Gom nhóm và chọn ảnh giữ lại ---
# split_priority chọn split được ưu tiên; keep_policy chọn ảnh trong split đó.
keep_policy: highest-resolution
cross_folder_only: false
grouping: connected
agglomerative_linkage: complete
agglomerative_cosine_threshold: null
